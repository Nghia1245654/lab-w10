name: Build, Scan, Push and Sign

on:
  push:
    branches:
      - main
    paths:
      - "src/api/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

jobs:
  build-scan-push-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Quyền cần thiết để push image lên GitHub Container Registry (GHCR)
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo owner name
        run: |
          echo "IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/w10-api" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./src/api
          load: true
          tags: ${{ env.IMAGE_NAME }}:0.0.1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:0.0.1
          format: 'table'
          exit-code: '1' # Bắt buộc fail pipeline nếu phát hiện lỗi bảo mật cao
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Build and push to registry
        uses: docker/build-push-action@v5
        with:
          context: ./src/api
          push: true
          tags: ${{ env.IMAGE_NAME }}:0.0.1

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the published image
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${{ env.IMAGE_NAME }}:0.0.1
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
